name: Build manual de release candidate

on:
  workflow_dispatch:

jobs:
  build-release-candidate:
    name: Construir artifact Windows seguro
    runs-on: windows-2022

    steps:
      - name: Obtener código
        uses: actions/checkout@v5

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Actualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Compilar módulos de la app
        run: python -m compileall app

      - name: Ejecutar pruebas unittest
        run: python -m unittest discover -s tests

      - name: Construir ejecutable con build.bat
        run: .\build.bat

      - name: Verificar ejecutable generado
        shell: pwsh
        run: |
          $exePath = "dist\Sistema de Macros de V\Sistema de Macros de V.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "No se encontró el ejecutable esperado: $exePath"
            exit 1
          }
          Write-Host "Ejecutable generado: $exePath"

      - name: Subir artifact de release candidate
        uses: actions/upload-artifact@v6
        with:
          name: Sistema-de-Macros-de-V-release-candidate
          path: dist\Sistema de Macros de V
          if-no-files-found: error
